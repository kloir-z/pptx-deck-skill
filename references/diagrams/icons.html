<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<!--
  icons.html — 図解用の汎用アイコンカタログ（コピペ元）

  使い方:
    1. このファイルをブラウザで開いて一覧を確認する
    2. 使いたいアイコンの <svg class="dicon">…</svg> をテンプレートHTMLへコピーする
    3. 色は CSS の color で決まる（stroke/fill は currentColor）—
       ノード内では color: var(--main) などパレット変数を親要素に指定する

  デザイン規約（新アイコンを足すときも守る）:
    - viewBox="0 0 48 48" / stroke-width 3 / round cap・join / fill なしの線画
    - 塗りが必要な点・バーだけ fill="currentColor" stroke="none"
    - 図解1枚の中でこの線画と他流派のアイコン（絵文字・塗りつぶし系）を混ぜない

  ブランドロゴ（GitHub, Slack など固有名詞）はここではなく
  scripts/brand_icon.js の brandIconSvg() で取得する（references/brand-icons.md 参照）。
-->
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: "BIZ UDPGothic", Meiryo, sans-serif; background: #F8FAFC;
    color: #1E293B; padding: 32px;
  }
  h1 { font-size: 20px; margin-bottom: 6px; }
  p  { font-size: 13px; color: #4B5563; margin-bottom: 24px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 14px;
  }
  .cell {
    background: #FFFFFF; border: 1px solid #E2E8F0; border-radius: 10px;
    padding: 18px 8px 10px; text-align: center; color: #1E3A8A;
  }
  .cell svg { width: 48px; height: 48px; }
  .cell .nm { font-size: 12px; color: #4B5563; margin-top: 10px; font-family: Consolas, monospace; }
</style>
</head>
